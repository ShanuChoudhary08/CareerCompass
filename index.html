<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerCompass</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="container">
  <div class="hero">
    <h1>CareerCompass</h1>
    <p>Discover your ideal career using your interests, strengths and academic background.</p>
  </div>

  <div class="glass-card">
    <div class="grid">
      <div>
        <label>Stream</label>
        <select id="stream">
          <option>Science</option>
          <option>Commerce</option>
          <option>Arts</option>
        </select>
      </div>
      <div>
        <label>Interests</label>
        <select id="interests" multiple>
          <option>Coding</option><option>AI</option><option>Mathematics</option>
          <option>Design</option><option>Marketing</option><option>Business</option>
          <option>Research</option>
        </select>
      </div>
      <div>
        <label>Strengths</label>
        <select id="strengths" multiple>
          <option>Problem Solving</option><option>Analytical Thinking</option>
          <option>Creativity</option><option>Communication</option>
          <option>Leadership</option>
        </select>
      </div>
    </div>
    <button onclick="analyzeCareer()">Find My Career</button>
  </div>

  <div id="result" class="glass-card hidden"></div>
</div>
<script src="script.js"></script>
</body>
</html>
